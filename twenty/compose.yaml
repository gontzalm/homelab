name: twenty

services:
  server:
    image: twentycrm/twenty
    container_name: twenty-server
    restart: unless-stopped
    environment:
      NODE_PORT: 3000
      PG_DATABASE_URL: postgres://postgres:${PG_DATABASE_PASSWORD}@db:5432/default
      SERVER_URL: https://${TAILSCALE_MACHINE}.${TAILSCALE_TAILNET}:3002
      REDIS_URL: redis://redis:6379
      STORAGE_TYPE: local
      APP_SECRET: ${APP_SECRET}
    volumes:
      - server-local-data:/app/packages/twenty-server/.local-storage
    ports:
      - 127.0.0.1:3002:3000
    networks:
      - default
      - homelab
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: curl --fail http://localhost:3000/healthz
      interval: 5s
      timeout: 5s
      retries: 20
      start_period: 5m
    labels:
      homepage.group: Tools
      homepage.name: Twenty
      homepage.icon: si-twenty
      homepage.href: https://${TAILSCALE_MACHINE}.${TAILSCALE_TAILNET}:3002
      homepage.description: CRM

  worker:
    image: twentycrm/twenty
    container_name: twenty-worker
    restart: unless-stopped
    command: ["yarn", "worker:prod"]
    environment:
      PG_DATABASE_URL: postgres://postgres:${PG_DATABASE_PASSWORD}@db:5432/default
      SERVER_URL: https://${TAILSCALE_MACHINE}.${TAILSCALE_TAILNET}:3002
      REDIS_URL: redis://redis:6379
      DISABLE_DB_MIGRATIONS: true # it already runs on the server
      DISABLE_CRON_JOBS_REGISTRATION: true # it already runs on the server
      APP_SECRET: ${APP_SECRET}
    volumes:
      - server-local-data:/app/packages/twenty-server/.local-storage
    depends_on:
      db:
        condition: service_healthy
      server:
        condition: service_healthy

  db:
    image: postgres:16
    container_name: twenty-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: default
      POSTGRES_PASSWORD: ${PG_DATABASE_PASSWORD}
      POSTGRES_USER: postgres
    volumes:
      - db-data:/var/lib/postgresql/data
    healthcheck:
      test: pg_isready -U postgres -h localhost -d postgres
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7
    container_name: twenty-redis
    restart: unless-stopped
    command: ["--maxmemory-policy", "noeviction"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  db-data:
  server-local-data:

networks:
  homelab:
    name: homelab
    external: true
