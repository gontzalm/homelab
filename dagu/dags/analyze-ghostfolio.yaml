description: Analyze Ghostfolio portfolio with AI
schedule: "0 20 * * sun"

container:
  exec: dagu-python-worker
  working_dir: /scripts/${DAG_NAME}
  env:
    - UV_PROJECT_ENVIRONMENT: /.venvs/analyze-ghostfolio

steps:
  - name: analyze-portfolio
    command: uv run analyze-ghostfolio

handler_on:
  failure:
    command: >-
      curl -H "Title: Dagu Worker" -H "Tags: warning,skull" -d "${DAG_NAME} DAG
      ${DAG_RUN_STATUS}" ntfy/dagu
